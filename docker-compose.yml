services:
  notebook:
    # build:
    #   context: .
    #   dockerfile: Dockerfile.gpu
    # container_name: semantic_tag_notebook
    image: semantic_tag_notebook_gpu
    restart: unless-stopped
    ports:
      - "8891:8891"
    volumes:
      - ./:/workspace
      - ./.cuda_cache:/root/.nv/ComputeCache
    working_dir: /workspace
    environment:
      JUPYTER_TOKEN: "websem"
      NVIDIA_VISIBLE_DEVICES: "all"
      NVIDIA_DRIVER_CAPABILITIES: "compute,utility"
      NVIDIA_DISABLE_REQUIRE: "1"
      CUDA_CACHE_PATH: "/root/.nv/ComputeCache"
      CUDA_CACHE_MAXSIZE: "4294967296"
      TF_CPP_MIN_LOG_LEVEL: "2"
      # Uncomment to force TF onto CPU (workaround for Blackwell PTX JIT hangs).
      # PyTorch keeps GPU access.
      # CUDA_VISIBLE_DEVICES: "-1"
    gpus:
      - driver: nvidia
        count: all
        capabilities: [compute, utility]
    shm_size: "4g"
    ipc: host
    command: >
      bash -lc "jupyter lab
      --ip=0.0.0.0
      --port=8891
      --no-browser
      --ServerApp.token=websem
      --ServerApp.allow_origin='*'
      --allow-root"
